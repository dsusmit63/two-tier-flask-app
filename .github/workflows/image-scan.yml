---
name: Image Scanning
on:
  workflow_call:
    inputs:
      dockerhub_user:
        required: true
        type: string
    secrets:
      dockerhub_token:
        required: true
jobs:
  image-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ inputs.dockerhub_user }}
          password: ${{ secrets.dockerhub_token }}
      - name: Image Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'docker.io/dsusmit63/two-tier-flask-app:${{ github.sha }}'
          severity: 'CRITICAL'
          exit-code: '1'
