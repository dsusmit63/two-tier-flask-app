---
name: SAST
on:
  workflow_call:
jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install Bandit
        run: |
         python -m pip install --upgrade pip
         pip install bandit==1.8.6
      - name: Run Bandit Scan
        run: bandit -r . -lll
