---
version: "3.9"
services:
  db:
    image: mysql:5.7
    container_name: flaskappdb
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - -p$MYSQL_ROOT_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - flask-app-data:/var/lib/mysql
    networks:
      - flask-app-nw

  flask-app:
    image: docker.io/dsusmit63/two-tier-flask-app:${IMAGE_TAG}
    container_name: flaskapp
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flask-app-nw
      - monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
volumes:
  flask-app-data:
  prometheus_data:
networks:
  flask-app-nw:
    driver: bridge
  monitoring:
    driver: bridge
