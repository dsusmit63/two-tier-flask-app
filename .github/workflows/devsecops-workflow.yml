---
name: DevSecOps Workflow
on:
  workflow_dispatch:
jobs:
  code-quality-check:
    uses: ./.github/workflows/code-quality.yml
  secret-scan:
    uses: ./.github/workflows/secret-scan.yml
  SAST:
    uses: ./.github/workflows/SAST.yml
  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml
  docker-scan:
    uses: ./.github/workflows/dockerfile-scan.yml
  build-and-push:
    needs: [code-quality-check, secret-scan, SAST, dependency-scan, docker-scan]
    uses: ./.github/workflows/build-and-push.yml
    with:
      dockerhub_user: ${{ vars.DOCKERHUB_USER }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
  image-scan:
    needs: [build-and-push]
    uses: ./.github/workflows/image-scan.yml
    with:
      dockerhub_user: ${{ vars.DOCKERHUB_USER }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
  deploy:
    needs: [image-scan]
    uses: ./.github/workflows/deploy.yml
    secrets:
      ec2_host: ${{ secrets.EC2_HOST }}
      ec2_private_key: ${{ secrets.EC2_PRIVATE_KEY }}
      ec2_user: ${{ secrets.EC2_USER }}
      ec2_port: ${{ secrets.EC2_PORT }}
